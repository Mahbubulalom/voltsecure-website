<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volt · European Network · Calon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:        #d4b46a;
    --gold-bright: #f3d488;
    --gold-mid:    #b89455;
    --gold-dim:    #7a653a;
    --land-fill:   rgba(212,180,106,0.10);
    --land-uk:     rgba(212,180,106,0.18);
    --bg:          #050402;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background:
      radial-gradient(ellipse at center, #0c0a05 0%, #060503 50%, #000 100%);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.14em;
    height: 100%;
    overflow: hidden;
    overflow-x: hidden;
  }

  body {
    display: grid;
    place-items: center;
  }

  /* Subtle starfield / noise dots for depth */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(212,180,106,0.25), transparent),
      radial-gradient(1px 1px at 24% 72%, rgba(212,180,106,0.18), transparent),
      radial-gradient(1px 1px at 78% 38%, rgba(212,180,106,0.22), transparent),
      radial-gradient(1px 1px at 88% 81%, rgba(212,180,106,0.15), transparent),
      radial-gradient(1px 1px at 56% 12%, rgba(212,180,106,0.20), transparent),
      radial-gradient(1px 1px at 42% 92%, rgba(212,180,106,0.16), transparent);
    pointer-events: none;
  }

  .stage {
    position: relative;
    width: min(98vmin, 1200px);
    aspect-ratio: 1 / 1;
  }

  /* Radar sweep (rotates inside the round frame) */
  .sweep {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from -90deg,
      rgba(243,212,136,0.40) 0deg,
      rgba(243,212,136,0.22) 22deg,
      rgba(243,212,136,0.08) 55deg,
      transparent 85deg,
      transparent 360deg
    );
    animation: sweep 8s linear infinite;
    mix-blend-mode: screen;
    -webkit-mask: radial-gradient(circle, black 0%, black 49%, transparent 49.5%);
            mask: radial-gradient(circle, black 0%, black 49%, transparent 49.5%);
    filter: blur(0.5px);
    z-index: 1;
  }
  @keyframes sweep {
    from { transform: rotate(0deg);   }
    to   { transform: rotate(360deg); }
  }

  svg.full { width: 100%; height: 100%; display: block; overflow: visible; }

  /* V Hexagon over Cardiff (radar centre) */
  .v-logo {
    position: absolute;
    top: 50%; left: 50%;
    width: 13%;
    aspect-ratio: 1 / 1;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 6;
    filter:
      drop-shadow(0 0 18px rgba(243,212,136,0.45))
      drop-shadow(0 0 4px rgba(212,180,106,0.6));
  }
  .v-logo svg { overflow: visible; }

  /* HUD corners */
  .hud {
    position: absolute; inset: 0;
    pointer-events: none;
    font-size: clamp(11px, 1.15vw, 14px);
    z-index: 7;
  }
  .hud > div {
    position: absolute;
    display: flex; align-items: center; gap: 0.6em;
  }
  .hud .tl { top: 2.5%;    left: 4%; }
  .hud .tr { top: 2.5%;    right: 4%; }
  .hud .bl { bottom: 2.5%; left: 4%; }
  .hud .br { bottom: 2.5%; right: 4%; }

  .pulse-dot {
    width: 8px; height: 8px;
    background: var(--gold-bright);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(243,212,136,0.7);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(243,212,136,0.6); }
    100% { box-shadow: 0 0 0 14px rgba(243,212,136,0); }
  }

  /* City labels overlay */
  .cities {
    position: absolute; inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .city {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: clamp(10px, 0.95vw, 13px);
    font-weight: 400;
    letter-spacing: 0.20em;
    color: var(--gold-bright);
    white-space: nowrap;
    text-shadow:
      0 0 8px rgba(0,0,0,0.95),
      0 0 4px rgba(0,0,0,0.9),
      0 0 2px rgba(0,0,0,1);
  }
  .city .name { display: block; }
  .city .sub  {
    display: block;
    font-size: 0.7em;
    color: var(--gold-mid);
    margin-top: 3px;
    letter-spacing: 0.22em;
  }
  .city.hq .name {
    color: #fff5d6;
    font-weight: 500;
    letter-spacing: 0.26em;
    font-size: 1.15em;
  }
  .city.hq .sub {
    color: var(--gold-bright);
  }

  .city-dot {
    transform-origin: center;
    transform-box: fill-box;
    animation: cityPulse 3.4s ease-in-out infinite;
  }
  .city-dot:nth-child(2n) { animation-delay: 0.5s; }
  .city-dot:nth-child(3n) { animation-delay: 1.2s; }
  .city-dot:nth-child(4n) { animation-delay: 1.9s; }
  @keyframes cityPulse {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 1; }
  }

  /* Network connection lines pulsing dash */
  .network line, .network path {
    stroke: var(--gold);
    stroke-width: 0.6;
    fill: none;
    opacity: 0.4;
    stroke-dasharray: 3 8;
    animation: dataflow 6s linear infinite;
  }
  @keyframes dataflow {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -110; }
  }

  .map-glow { filter: drop-shadow(0 0 6px rgba(212,180,106,0.20)); }

  /* Mobile-only adjustments — desktop layout untouched */
  .hud .bl .bl-short { display: none; }

  @media (max-width: 600px) {
    /* kill starfield for battery + cleaner small-screen read */
    body::before { display: none; }

    /* drop sweep blur on mobile for perf */
    .sweep { filter: blur(0); }

    /* V hexagon bumped 13% -> 18% so it reads on a phone */
    .v-logo { width: 18%; }

    /* HUD pulled tighter to edge: 4% -> 2% inset */
    .hud { font-size: 11px; }
    .hud .tl { top: 2%; left: 2%; }
    .hud .tr { top: 2%; right: 2%; }
    .hud .bl { bottom: 2%; left: 2%; }
    .hud .br { bottom: 2%; right: 2%; }

    /* city labels: floor at 11px so they remain legible */
    .city { font-size: 11px; }
    .city.hq .name { font-size: 12.5px; }
    .city .sub { font-size: 9px; }

    /* hide less-critical labels (dots remain) so 10 headline cities show clean */
    .city.mobile-hide { display: none; }

    /* edge labels: right-anchor so VIENNA at left:96% doesn't clip the screen */
    .city.edge-right { transform: translate(-100%, -50%); padding-right: 4px; }

    /* swap HUD bottom-left to the shorter copy */
    .hud .bl .bl-long  { display: none; }
    .hud .bl .bl-short { display: inline; }
  }
</style>
</head>

<script>
  // Tick marks around outer ring — steady, no rotation
  (function() {
    const ticks = document.getElementById('ticks');
    if (!ticks) return;
    const N = 96, ns = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const major = i % 8 === 0;
      const r1 = 468, r2 = major ? 496 : 484;
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', Math.cos(a) * r1);
      line.setAttribute('y1', Math.sin(a) * r1);
      line.setAttribute('x2', Math.cos(a) * r2);
      line.setAttribute('y2', Math.sin(a) * r2);
      line.setAttribute('opacity', major ? 0.8 : 0.35);
      ticks.appendChild(line);
    }
  })();

  (function() {
    const el = document.getElementById('clock');
    function tick() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const ss = String(d.getSeconds()).padStart(2, '0');
      el.innerHTML = `<span>\\${hh}:${mm}:${ss} BST</span>`;
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>

</body>
</html>
